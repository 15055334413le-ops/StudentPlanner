workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        provisioning_profiles:
          - profile: ios_ad_hoc
        certificates:
          - certificate: ios_development
      vars:
        BUNDLE_ID: com.mineday.studentplanner
        APP_NAME: StudentPlanner
        XCODE_WORKSPACE: ""
        XCODE_SCHEME: StudentPlanner
      groups:
        - app_store_credentials
      xcode: 16.0
    scripts:
      - name: Build iOS
        script: |
          xcodebuild build \
            -project "StudentPlanner.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Create IPA
        script: |
          xcrun --sdk iphoneos PackageApplication \
            -v "$(find . -name '*.app' -type d -path '*/Release-iphoneos/*' | head -1)" \
            -o "$(pwd)/build/StudentPlanner.ipa"
    artifacts:
      - build/**/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email: {}
      slack: {}
