name: Build iOS IPA

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build iOS app
        run: |
          xcodebuild build \
            -project StudentPlanner.xcodeproj \
            -scheme StudentPlanner \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR=build

      - name: Create IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -r build/Release-iphoneos/StudentPlanner.app build/ipa/Payload/
          cd build/ipa
          zip -r ../StudentPlanner.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: StudentPlanner-ipa
          path: build/StudentPlanner.ipa
